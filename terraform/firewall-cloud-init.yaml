#cloud-config
# Debian 12 cloud-init configuration for Firewall Router

hostname: ${hostname}
manage_hostname: true
preserve_hostname: false

# Set timezone
timezone: UTC

# Update system
apt:
  preserve_sources_list: true
  primary:
    - arches: [amd64, i386]
      uri: "http://deb.debian.org/debian"
  security:
    - arches: [amd64, i386]
      uri: "http://security.debian.org/debian-security"

package_update: true
package_upgrade: true
package_reboot_if_required: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - openssh-server
  - openssh-client
  - ca-certificates
  - gnupg
  - apt-transport-https
  - iptables-persistent
  - nftables

# Configure SSH
ssh:
  enabled: true
  port: 22
  password_authentication: true

# Users and groups
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker,wheel
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ${ssh_public_key}

# Set passwords for debian and root users
chpasswd:
  list: |
    debian:${vm_password}
    root:${vm_password}
  expire: false

# Network configuration with static IPs on all interfaces
network:
  version: 2
  renderer: networkd
  ethernets:
    # Management interface (DHCP) - ens18
    ens18:
      dhcp4: true
      dhcp4-overrides:
        use-dns: true
        use-ntp: true
      activate: true
    # Dev zone interface (10.10.0.1/24) - ens19
    ens19:
      addresses:
        - 10.10.0.1/24
      dhcp4: false
      activate: true
    # Prod zone interface (10.20.0.1/24) - ens20
    ens20:
      addresses:
        - 10.20.0.1/24
      dhcp4: false
      activate: true
    # Infra zone interface (10.30.0.1/24) - ens21
    ens21:
      addresses:
        - 10.30.0.1/24
      dhcp4: false
      activate: true

# Configure DNS
resolv_conf:
  nameservers: ${dns_servers}
  searchdomains: []

# Boot commands for IP forwarding and NAT rules
bootcmd:
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  - sysctl -p

# Run commands to set up NAT rules and apply network config
runcmd:
  - netplan apply
  - sleep 2
  - iptables -t nat -A POSTROUTING -o ens18 -j MASQUERADE
  - iptables -A FORWARD -i ens19 -o ens18 -j ACCEPT
  - iptables -A FORWARD -i ens20 -o ens18 -j ACCEPT
  - iptables -A FORWARD -i ens21 -o ens18 -j ACCEPT
  - iptables -A FORWARD -i ens18 -o ens19 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i ens18 -o ens20 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i ens18 -o ens21 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - netfilter-persistent save

# Final message
final_message: "Firewall booted successfully. Instance uptime: $UPTIME seconds"

