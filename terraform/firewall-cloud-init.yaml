#cloud-config
# Debian 12 cloud-init configuration for Firewall Router

hostname: ${hostname}
manage_hostname: true
preserve_hostname: false

# Set timezone
timezone: UTC

# Update system
apt:
  preserve_sources_list: true
  primary:
    - arches: [amd64, i386]
      uri: "http://deb.debian.org/debian"
  security:
    - arches: [amd64, i386]
      uri: "http://security.debian.org/debian-security"

package_update: true
package_upgrade: true
package_reboot_if_required: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - openssh-server
  - openssh-client
  - ca-certificates
  - gnupg
  - apt-transport-https
  - iptables-persistent
  - nftables

# Configure SSH
ssh:
  enabled: true
  port: 22

# Users and groups
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker,wheel
    shell: /bin/bash
    lock_passwd: false
    passwd: "${vm_password}"
    ssh_authorized_keys:
      - "${ssh_public_key}"

# Set root password
chpasswd:
  list: |
    root:${vm_password}
  expire: false

# Network configuration with static IPs on all interfaces
network:
  version: 2
  ethernets:
    # Management interface (DHCP)
    eth0:
      dhcp4: true
    # Dev zone interface (10.10.0.1/24)
    eth1:
      addresses:
        - 10.10.0.1/24
      dhcp4: false
    # Prod zone interface (10.20.0.1/24)
    eth2:
      addresses:
        - 10.20.0.1/24
      dhcp4: false
    # Infra zone interface (10.30.0.1/24)
    eth3:
      addresses:
        - 10.30.0.1/24
      dhcp4: false

# Configure DNS
resolv_conf:
  nameservers: ${dns_servers}
  searchdomains: []

# Boot commands for IP forwarding and NAT rules
bootcmd:
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  - sysctl -p

# Run commands to set up NAT rules
runcmd:
  - iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
  - iptables -A FORWARD -i eth1 -o eth0 -j ACCEPT
  - iptables -A FORWARD -i eth2 -o eth0 -j ACCEPT
  - iptables -A FORWARD -i eth3 -o eth0 -j ACCEPT
  - iptables -A FORWARD -i eth0 -o eth1 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i eth0 -o eth2 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i eth0 -o eth3 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - netfilter-persistent save

# Final message
final_message: "Firewall booted successfully. Instance uptime: $UPTIME seconds"

