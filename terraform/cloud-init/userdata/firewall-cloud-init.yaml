#cloud-config
# Debian 12 cloud-init configuration for Firewall Router

hostname: ${hostname}
preserve_hostname: false

# Set timezone
timezone: Europe/Zurich

# Update system
apt:
  preserve_sources_list: true
  primary:
    - arches: [amd64, i386]
      uri: "http://deb.debian.org/debian"
  security:
    - arches: [amd64, i386]
      uri: "http://security.debian.org/debian-security"

# Users and groups
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker,wheel
    shell: /bin/bash
    lock_passwd: false
    plain_text_passwd: "${vm_password}"
    ssh_authorized_keys:
      - ${ssh_public_key}
  - name: root
    lock_passwd: false
    plain_text_passwd: "${vm_password}"

# Configure DNS
resolv_conf:
  nameservers: ${dns_servers}
  searchdomains: []

package_update: true
package_upgrade: true
package_reboot_if_required: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - openssh-server
  - openssh-client
  - ca-certificates
  - gnupg
  - apt-transport-https
  - iptables-persistent
  - nftables
  - qemu-guest-agent

# Configure SSH
ssh:
  emit_keys_to_console: false

# Boot commands for IP forwarding and NAT rules
bootcmd:
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  - sysctl -p

# Run commands to set up NAT rules and apply network config
runcmd:
  - systemctl enable qemu-guest-agent
  - systemctl start qemu-guest-agent
  - iptables -t nat -A POSTROUTING -o ens18 -j MASQUERADE
  - iptables -A FORWARD -i ens18 -o ens19 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i ens18 -o ens20 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - iptables -A FORWARD -i ens18 -o ens21 -m state --state RELATED,ESTABLISHED -j ACCEPT
  - netfilter-persistent save

# Final message
final_message: "Firewall booted successfully. Instance uptime: $UPTIME seconds"

