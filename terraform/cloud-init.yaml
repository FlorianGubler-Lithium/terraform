#cloud-config
# Debian 12 cloud-init configuration for Kubernetes nodes

hostname: ${hostname}
manage_hostname: true
preserve_hostname: false

# Set timezone
timezone: UTC

# Update system
apt:
  preserve_sources_list: true
  primary:
    - arches: [amd64, i386]
      uri: "http://deb.debian.org/debian"
  security:
    - arches: [amd64, i386]
      uri: "http://security.debian.org/debian-security"

package_update: true
package_upgrade: true
package_reboot_if_required: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - openssh-server
  - openssh-client
  - ca-certificates
  - gnupg
  - apt-transport-https

# Configure SSH
ssh:
  enabled: true
  port: 22
  password_authentication: true

# Users and groups
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker,wheel
    shell: /bin/bash
    lock_passwd: false
    ssh_authorized_keys:
      - ${ssh_public_key}

# Set passwords for debian and root users
chpasswd:
  list: |
    debian:${vm_password}
    root:${vm_password}
  expire: false

# Network configuration
network:
  version: 2
  renderer: networkd
  ethernets:
    # Primary interface (DHCP) - ens18
    ens18:
      dhcp4: true
      dhcp4-overrides:
        use-dns: true
        use-ntp: true
      activate: true

# Configure DNS
resolv_conf:
  nameservers: ${dns_servers}
  searchdomains: []

# Final message
final_message: "System booted successfully. Instance uptime: $UPTIME seconds"

