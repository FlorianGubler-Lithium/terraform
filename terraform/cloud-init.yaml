#cloud-config
# Debian 12 cloud-init configuration for Kubernetes nodes

hostname: ${hostname}
manage_hostname: true
preserve_hostname: false

# Set timezone
timezone: UTC

# Update system
apt:
  preserve_sources_list: true
  primary:
    - arches: [amd64, i386]
      uri: "http://deb.debian.org/debian"
  security:
    - arches: [amd64, i386]
      uri: "http://security.debian.org/debian-security"

package_update: true
package_upgrade: true
package_reboot_if_required: true

# Install required packages
packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - jq
  - unzip
  - openssh-server
  - openssh-client
  - ca-certificates
  - gnupg
  - apt-transport-https

# Configure SSH
ssh:
  enabled: true
  port: 22

# Users and groups
users:
  - name: debian
    gecos: Debian User
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo,docker,wheel
    shell: /bin/bash
    lock_passwd: false
    passwd: "${vm_password}"
    ssh_authorized_keys:
      - "${ssh_public_key}"

# Set root password
chpasswd:
  list: |
    root:${vm_password}
  expire: false

# Network configuration
network:
  version: 2
  ethernets:
    eth0:
      dhcp4: true

# Configure DNS
resolv_conf:
  nameservers: [${dns_servers}]
  searchdomains: []

# Final message
final_message: "System booted successfully. Instance uptime: $UPTIME seconds"

