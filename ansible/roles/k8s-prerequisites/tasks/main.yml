---
# Kubernetes Prerequisites Role
# Install CRI-O, kubeadm, kubelet, and configure system for Kubernetes

- name: Wait for SSH to be ready
  ansible.builtin.wait_for_connection:
    delay: 10
    timeout: 300

- name: Update system packages
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
      - ca-certificates
      - lsb-release
      - software-properties-common
      - bridge-utils
      - iptables
    state: present
  become: yes

- name: Configure kernel modules for Kubernetes
  ansible.builtin.blockinfile:
    path: /etc/modules-load.d/k8s.conf
    create: yes
    block: |
      overlay
      br_netfilter
  become: yes

- name: Load kernel modules
  ansible.builtin.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter
  become: yes

- name: Configure sysctl for Kubernetes
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - { name: "net.bridge.bridge-nf-call-iptables", value: "1" }
    - { name: "net.bridge.bridge-nf-call-ip6tables", value: "1" }
    - { name: "net.ipv4.ip_forward", value: "1" }
  become: yes

- name: Disable swap
  ansible.builtin.shell: swapoff -a
  when: ansible_swaptotal_mb > 0
  become: yes

- name: Comment out swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*swap.*)$'
    replace: '# \1'
  become: yes

- name: Add CRI-O repository key
  ansible.builtin.apt_key:
    url: "https://pkgs.k8s.io/addons:/cri-o:/stable:/v{{ crio_version }}/deb/Release.key"
    keyring: /usr/share/keyrings/cri-o-archive-keyring.gpg
    state: present
  environment:
    http_proxy: "{{ http_proxy | default('') }}"
    https_proxy: "{{ https_proxy | default('') }}"
    no_proxy: "{{ no_proxy | default('') }}"
  become: yes
  register: crio_key
  until: crio_key is succeeded
  retries: 3
  delay: 5

- name: Add CRI-O repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cri-o-archive-keyring.gpg] https://pkgs.k8s.io/addons:/cri-o:/stable:/v{{ crio_version }}/deb/ /"
    state: present
  become: yes

- name: Install CRI-O
  ansible.builtin.apt:
    name:
      - cri-o
      - cri-o-runc
    state: present
    update_cache: yes
  become: yes

- name: Enable and start CRI-O service
  ansible.builtin.systemd:
    name: crio
    state: started
    enabled: yes
    daemon_reload: yes
  become: yes

- name: Add Kubernetes repository key
  ansible.builtin.apt_key:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
    keyring: /usr/share/keyrings/kubernetes-archive-keyring.gpg
    state: present
  environment:
    http_proxy: "{{ http_proxy | default('') }}"
    https_proxy: "{{ https_proxy | default('') }}"
    no_proxy: "{{ no_proxy | default('') }}"
  become: yes
  register: k8s_key
  until: k8s_key is succeeded
  retries: 3
  delay: 5

- name: Add Kubernetes repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/kubernetes-archive-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
    state: present
  become: yes

- name: Install Kubernetes tools
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: yes
  become: yes

- name: Hold Kubernetes tools versions
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: yes

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: yes
    daemon_reload: yes
  become: yes
  # Don't start kubelet yet - it will fail without kubeadm init/join configuration

- name: Verify CRI-O is running
  ansible.builtin.systemd:
    name: crio
    state: started
  become: yes
  register: crio_status
  changed_when: false

- name: Display CRI-O status
  ansible.builtin.debug:
    msg: "CRI-O is running successfully"
  when: crio_status.status.ActiveState == "active"

