[defaults]
# Inventory and roles configuration
inventory = inventory.ini
roles_path = roles:./roles:../roles
library = library

# Host key checking (disable for fresh VMs in lab environment)
host_key_checking = False

# Vault password file location
vault_password_file = /etc/ansible/.vaultpass
vault_identity_list = default

# Logging
log_path = ./ansible.log

# Default settings
timeout = 30
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 86400

# Parallel execution
forks = 5

# Callback plugins
stdout_callback = yaml

[ssh_connection]
# SSH configuration for Ansible
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
control_master = auto
control_persist = 60s
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null

